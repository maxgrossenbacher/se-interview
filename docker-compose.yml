version: "3.9"

services:
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
    volumes:
      - phoenix_data:/data

  agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006
    depends_on:
      - phoenix

volumes:
  phoenix_data: